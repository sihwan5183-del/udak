<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALL-IN-ONE 어드민</title>
<style>
:root{
  --navy:#1a237e;--navy2:#283593;--navyL:#e8eaf6;
  --white:#fff;--g50:#f8f9fa;--g100:#f1f3f5;--g200:#e9ecef;--g300:#dee2e6;
  --g400:#adb5bd;--g500:#868e96;--g600:#495057;--g800:#212529;
  --red:#e53935;--green:#2e7d32;--accent:#ff6f00;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--g50);color:var(--g800)}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit}

/* ── 로그인 ── */
#loginWrap{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px 32px;width:320px;text-align:center}
.login-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--g400);margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--g300);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-input:focus{border-color:var(--navy)}
.login-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border-radius:8px;font-size:14px;font-weight:700}

/* ── 레이아웃 ── */
.header{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:800;letter-spacing:.02em}
.logout-btn{background:rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600}
.tabs{background:#fff;border-bottom:1px solid var(--g200);display:flex;overflow-x:auto;padding:0 16px;gap:4px;position:sticky;top:56px;z-index:90}
.tab{padding:13px 16px;font-size:13px;font-weight:600;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.content{max-width:960px;margin:0 auto;padding:28px 20px}

/* ── 섹션 카드 ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--g200);padding:20px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .cnt{font-size:12px;color:var(--g400);font-weight:400}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:var(--g50);padding:10px 12px;font-size:12px;font-weight:600;color:var(--g500);text-align:left;border-bottom:1px solid var(--g200)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:hover td{background:var(--g50)}
.td-actions{display:flex;gap:6px;white-space:nowrap}

/* ── 버튼 ── */
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2)}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.btn-red{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.add-btn{padding:10px 18px;background:var(--navy);color:#fff;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:16px}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px}
.modal-bg.on{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:28px 24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--g600);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--g300);border-radius:7px;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{min-height:70px;resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700}

/* ── 토글 ── */
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{display:none}
.toggle-slider{position:absolute;inset:0;background:var(--g300);border-radius:11px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-slider{background:var(--navy)}
.toggle-slider::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.toggle input:checked+.toggle-slider::after{transform:translateX(18px)}

/* ── 배너 섹션 ── */
.banner-item{display:flex;gap:12px;align-items:flex-start;padding:14px;background:var(--g50);border-radius:8px;margin-bottom:10px;border:1px solid var(--g200)}
.banner-num{width:24px;height:24px;background:var(--navy);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.banner-fields{flex:1;display:flex;flex-direction:column;gap:8px}
.banner-fields input{width:100%;padding:8px 10px;border:1.5px solid var(--g300);border-radius:6px;font-size:12px;outline:none}
.banner-fields input:focus{border-color:var(--navy)}
.banner-preview{width:60px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--g200);background:var(--g100)}






/* ── 토스트 ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;display:none;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── OTT 리스트 ── */
.ott-grid{display:flex;flex-wrap:wrap;gap:10px}
.ott-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid var(--g200);border-radius:8px;background:#fff}
.ott-item.on{border-color:var(--navy);background:var(--navyL)}
.ott-name{font-size:13px;font-weight:600}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-title">🔐 ALL-IN-ONE 어드민</div>
    <div class="login-sub">관리자 비밀번호를 입력해주세요</div>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<div id="adminWrap" style="display:none">
  <div class="header">
    <div class="header-title">ALL-IN-ONE 어드민</div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="tabs">
    <div class="tab on" data-tab="plans" onclick="switchTab('plans')">💳 요금제</div>
    <div class="tab" data-tab="devices" onclick="switchTab('devices')">📱 기기 (모바일)</div>
<div class="tab" data-tab="aio_devices" onclick="switchTab('aio_devices')">📱 올인원 기기</div>
<div class="tab" data-tab="aio_discount" onclick="switchTab('aio_discount')">💰 가족할인 설정</div>
<div class="tab" data-tab="aio_benefits" onclick="switchTab('aio_benefits')">🎁 추가혜택 설정</div>
    <div class="tab" data-tab="devices2nd" onclick="switchTab('devices2nd')">⌚ 2ND 기기</div>
    <div class="tab" data-tab="policies" onclick="switchTab('policies')">📋 정책</div>
    <div class="tab" data-tab="ott" onclick="switchTab('ott')">🎬 OTT</div>
    <div class="tab" data-tab="banners" onclick="switchTab('banners')">🖼 배너</div>
    <div class="tab" data-tab="modalbanner" onclick="switchTab('modalbanner')">🎁 완료 모달</div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 기기 모달 -->
<div class="modal-bg" id="devModal">
  <div class="modal-box">
    <div class="modal-title" id="devModalTitle">기기 추가</div>
    <input type="hidden" id="devModalKey">
    <div class="field"><label>기기명 *</label><input id="devName" placeholder="갤럭시 S26"></div>
    <div class="field"><label>이미지 URL</label><input id="devImg" placeholder="https://..."></div>
    <div class="field"><label>표시 여부</label>
      <select id="devVisible"><option value="true">표시</option><option value="false">숨김</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('devModal')">취소</button>
      <button class="btn btn-navy" onclick="saveDev()">저장</button>
    </div>
  </div>
</div>

<!-- 정책 모달 -->
<div class="modal-bg" id="polModal">
  <div class="modal-box">
    <div class="modal-title" id="polModalTitle">정책 추가</div>
    <input type="hidden" id="polModalKey">
    <div class="field"><label>정책명 * (수정 가능)</label><input id="polName" placeholder="통신사 이동 지원금 (타사→LGU+)"></div>
    <div class="field"><label>적용 통신사</label>
      <select id="polCarrier">
        <option value="all">전체</option>
        <option value="tasa">타사 전환 고객</option>
        <option value="jasa">자사 (LGU+) 고객</option>
      </select>
    </div>
    <div class="field"><label>1인 금액 (원)</label><input id="polAmt1" type="number" placeholder="300000"></div>
    <div class="field"><label>2인 금액 (원)</label><input id="polAmt2" type="number" placeholder="600000"></div>
    <div class="field"><label>4인 금액 (원)</label><input id="polAmt4" type="number" placeholder="1200000"></div>
    <div class="field"><label>설명 (선택)</label><textarea id="polDesc" placeholder="세부 조건 설명"></textarea></div>
    <div class="field"><label>표시 여부</label>
      <select id="polVisible"><option value="true">표시</option><option value="false">숨김</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('polModal')">취소</button>
      <button class="btn btn-navy" onclick="savePol()">저장</button>
    </div>
  </div>
</div>

<!-- 2ND 기기 모달 -->
<div class="modal-bg" id="dev2Modal">
  <div class="modal-box">
    <div class="modal-title" id="dev2ModalTitle">2ND 기기 추가</div>
    <input type="hidden" id="dev2ModalKey">
    <div class="field"><label>기기명 *</label><input id="dev2Name" placeholder="갤럭시 워치 7"></div>
    <div class="field"><label>종류</label>
      <select id="dev2Type">
        <option value="watch">워치</option>
        <option value="tab">탭</option>
        <option value="etc">기타</option>
      </select>
    </div>
    <div class="field"><label>이미지 URL</label><input id="dev2Img" placeholder="https://..."></div>
    <div class="field"><label>월 기기값 할부 (원)</label><input id="dev2Device" type="number" placeholder="15000"></div>
    <div class="field"><label>월 요금 (원)</label><input id="dev2Plan" type="number" placeholder="11000"></div>
    <div class="field"><label>적용 요금제 (최소)</label>
      <select id="dev2MinPlan">
        <option value="95000">95,000원 이상</option>
        <option value="115000">115,000원 이상</option>
        <option value="130000">130,000원 이상</option>
      </select>
    </div>
    <div class="field"><label>표시 여부</label>
      <select id="dev2Visible"><option value="true">표시</option><option value="false">숨김</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('dev2Modal')">취소</button>
      <button class="btn btn-navy" onclick="saveDev2()">저장</button>
    </div>
  </div>
</div>

<script>const PW = 'udak2024';
const DB_URL = 'https://udak-c6832-default-rtdb.firebaseio.com';
const BASE = DB_URL + '/allinone';

const db = {
  ref: function(path) {
    const url = BASE + '/' + path + '.json';
    return {
      once: () => fetch(url).then(r=>r.json()).then(d=>({exists:()=>d!==null&&d!==undefined,val:()=>d})),
      set: v => fetch(url,{method:'PUT',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}}).then(r=>r.json()),
      update: v => fetch(url,{method:'PATCH',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}}).then(r=>r.json()),
      remove: () => fetch(url,{method:'DELETE'}).then(r=>r.json()),
      push: v => fetch(url,{method:'POST',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}}).then(r=>r.json()),
    };
  }
};

/* ── 로그인 ── */
window.doLogin = function() {
  const pw = document.getElementById('pwInput').value;
  if(pw === PW) {
    localStorage.setItem('aio_admin_auth', '1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    initAdmin();
  } else {
    alert('비밀번호가 올바르지 않습니다.');
  }
};
window.logout = function() {
  localStorage.removeItem('aio_admin_auth');
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('adminWrap').style.display='none';
  document.getElementById('pwInput').value='';
};
// 새로고침 시 로그인 상태 복원
(function(){
  if(localStorage.getItem('aio_admin_auth')==='1'){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    // initAdmin은 DOMContentLoaded 이후 호출
    document.addEventListener('DOMContentLoaded', function(){ initAdmin(); });
  }
})();

function initAdmin() { renderTab('plans'); initAioPlans(); }
/* ══ 올인원 플랜 초기화 ══ */
async function initAioPlans() {
  const s = await db.ref('plans').once();
  if (s.exists() && s.val() && Object.keys(s.val()).length > 0) return; // 이미 있으면 skip
  const defaults = [
    {name:'플러스플랜 95', price:95000, visible:true},
    {name:'플러스플랜 115', price:115000, visible:true},
    {name:'플러스플랜 130', price:130000, visible:true}
  ];
  for (const p of defaults) {
    await db.ref('plans').push(p);
  }
  toast('기본 요금제 3개 초기화 완료!');
  renderPlans();
}


/* ── 탭 ── */
window.switchTab = function(t) {
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on', el.dataset.tab===t));
  renderTab(t);
};

function renderTab(t) {
  if(t==='plans') renderPlans();
  else if(t==='devices') renderDevices();
  else if(t==='aio_devices') renderAioDevices();
  else if(t==='aio_discount') renderAioDiscount();
  else if(t==='aio_benefits') renderAioBenefits();
  else if(t==='devices2nd') renderDevices2nd();
  else if(t==='policies') renderPolicies();
  else if(t==='ott') renderOtt();
  else if(t==='banners') renderBanners();
  else if(t==='modalbanner') renderModalBanners();
}

/* ── 토스트 ── */
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? '#e53935' : '#1a237e';
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 2500);
}

/* ── 모달 ── */
function openModal(id){document.getElementById(id).classList.add('on');}
function closeModal(id){document.getElementById(id).classList.remove('on');}

/* ═══════════════════════════════
   💳 요금제 관리
═══════════════════════════════ */
let planData = {};
async function renderPlans() {
  const s = await db.ref('plans').once();
  planData = s.exists() ? s.val() : {};
  const mc = document.getElementById('mainContent');
  const rows = Object.entries(planData).sort((a,b)=>(a[1].price||0)-(b[1].price||0));
  mc.innerHTML = `
    <div class="card">
      <div class="card-title">💳 요금제 관리 <span class="cnt">(어드민에서 단가/표시 수정 가능)</span></div>
      <button class="add-btn" onclick="openPlanModal()">+ 요금제 추가</button>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>요금제명</th><th>단가(원)</th><th>표시</th><th>관리</th></tr></thead>
          <tbody id="planTbody">${rows.length===0?'<tr><td colspan="4" style="text-align:center;color:var(--g400);padding:24px">등록된 요금제 없음</td></tr>':''}${rows.map(([k,p])=>`
            <tr>
              <td><strong>${p.name||p.price?.toLocaleString()+'원'}</strong></td>
              <td>${p.price?.toLocaleString()}원</td>
              <td>
                <label class="toggle"><input type="checkbox" ${p.visible!==false?'checked':''} onchange="togglePlanVisible('${k}',this.checked)"><span class="toggle-slider"></span></label>
              </td>
              <td class="td-actions">
                <button class="btn btn-outline btn-sm" onclick="editPlan('${k}')">수정</button>
                <button class="btn btn-red btn-sm" onclick="delPlan('${k}')">삭제</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

window.openPlanModal = function(key='') {
  document.getElementById('mainContent').insertAdjacentHTML('beforeend',`
    <div class="modal-bg on" id="planModal">
      <div class="modal-box">
        <div class="modal-title">${key?'요금제 수정':'요금제 추가'}</div>
        <input type="hidden" id="planModalKey" value="${key}">
        <div class="field"><label>요금제명 *</label><input id="planName" value="${key&&planData[key]?.name||''}" placeholder="5G 프리미어 레귤러"></div>
        <div class="field"><label>단가 (원) *</label><input id="planPrice" type="number" value="${key&&planData[key]?.price||''}" placeholder="95000"></div>
        <div class="field"><label>표시 여부</label>
          <select id="planVisible"><option value="true" ${(!key||planData[key]?.visible!==false)?'selected':''}>표시</option><option value="false" ${key&&planData[key]?.visible===false?'selected':''}>숨김</option></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="document.getElementById('planModal').remove()">취소</button>
          <button class="btn btn-navy" onclick="savePlan()">저장</button>
        </div>
      </div>
    </div>`);
};

window.editPlan = k => openPlanModal(k);

window.savePlan = async function() {
  const key = document.getElementById('planModalKey').value;
  const name = document.getElementById('planName').value.trim();
  const price = parseInt(document.getElementById('planPrice').value);
  const visible = document.getElementById('planVisible').value === 'true';
  if(!name||!price){alert('요금제명과 단가는 필수입니다.');return;}
  const data = {name, price, visible};
  if(key) await db.ref(`plans/${key}`).update(data);
  else await db.ref('plans').push(data);
  document.getElementById('planModal')?.remove();
  toast('저장되었습니다.');
  renderPlans();
};

window.togglePlanVisible = async function(k, checked) {
  await db.ref(`plans/${k}`).update({visible: checked});
  toast(checked?'표시로 변경됨':'숨김으로 변경됨');
};

window.delPlan = async function(k) {
  if(!confirm('삭제하시겠습니까?')) return;
  await db.ref(`plans/${k}`).remove();
  toast('삭제되었습니다.');
  renderPlans();
};

/* ═══════════════════════════════
   📱 기기 관리 (모바일)
═══════════════════════════════ */
let devData = {};
async function renderDevices() {
  const s = await db.ref('devices').once();
  devData = s.exists() ? s.val() : {};
  const rows = Object.entries(devData);
  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-title">📱 모바일 기기 관리 <span class="cnt">(랜딩 STEP 6에 표시)</span></div>
      <button class="add-btn" onclick="openDevModal()">+ 기기 추가</button>
      <div class="tbl-wrap">

async function renderAioDevices() {
  const s = await db.ref('devices').once();
  const devs = s.exists() ? s.val() : {};
  let rows = '';
  Object.entries(devs).forEach(([k,d])=>{
    if(!d||!d.name) return;
    const storTxt = d.storageList ? d.storageList.map(s=>{const final=s.msrp?(s.msrp-(s.subsidy||0)-(s.udak||0)).toLocaleString()+'원':((s.price||0).toLocaleString()+'원');const disc=s.msrp?` <span style="color:#dc2626;font-size:10px">(${Math.round((1-(s.msrp-(s.subsidy||0)-(s.udak||0))/s.msrp)*100)}%↓)</span>`:'';return`<span style="display:inline-block;background:#f3f4f6;padding:2px 5px;border-radius:4px;font-size:11px;margin:1px">${s.name} <del style="color:#9ca3af">${s.msrp?(s.msrp).toLocaleString()+'원':''}</del> <strong>${final}</strong>${disc}</span>`}).join(' ') : '–';
    const colTxt = d.colorList ? d.colorList.map(c=>{const p=(c.name||'').split('|');return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px"><span style="width:10px;height:10px;border-radius:50%;background:${p[0]||'#ccc'};border:1px solid #ddd;display:inline-block"></span>${p[1]||p[0]}</span>`;}).join(' ') : '–';
    // 최저 실구매가 계산 (256GB 또는 첫 번째 용량 기준)
    let minPrice = null;
    if (d.storageList && d.storageList.length > 0) {
      const s256 = d.storageList.find(s=>s.name&&s.name.includes('256')) || d.storageList[0];
      if (s256 && s256.msrp) {
        minPrice = s256.msrp - (s256.subsidy||0) - (s256.udak||0);
      }
    }
    rows += `<tr>
      <td><strong>${d.name}</strong>${minPrice?`<br><span style="font-size:11px;color:#dc2626;font-weight:700">${minPrice.toLocaleString()}원~</span>`:''}</td>
      <td>${d.img?`<img src="${d.img}" style="height:40px;object-fit:contain;border-radius:4px">`:'–'}</td>
      <td>${storTxt}</td>
      <td>${colTxt}</td>
      <td><input type="checkbox" ${d.visible!==false?'checked':''} onchange="toggleAioDev('${k}',this.checked)" style="width:16px;height:16px;cursor:pointer"></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editAioDev('${k}')">수정</button>
        <button class="btn btn-red btn-sm" onclick="delAioDev('${k}')">삭제</button>
      </td>
    </tr>`;
  });
  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-title">📱 올인원 기기 관리 <span class="cnt">(allinone/devices)</span></div>
      <button class="add-btn" onclick="openAioDevModal()">+ 기기 추가</button>
      <div style="overflow-x:auto;margin-top:12px">
      <table>
        <thead><tr><th>기기명</th><th>이미지</th><th>용량/가격</th><th>색상</th><th>노출</th><th>관리</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:24px">등록된 기기가 없습니다</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function calcBoxHtml(msrp, sub, udak, label) {
  if (!msrp || !sub) return label + ' 공시지원금 입력 시 자동계산';
  const fin = msrp - sub - udak;
  const pct = Math.round((1 - fin/msrp)*100);
  return '<span style="color:#6b7280;font-size:11px">'+label+'</span> <del style="color:#9ca3af">'+msrp.toLocaleString()+'원</del> - <span style="color:#dc2626">공시 '+sub.toLocaleString()+'원</span>'+(udak?' - <span style="color:#1a237e">유닥 '+udak.toLocaleString()+'원</span>':'')+' = <strong style="color:#1a237e;font-size:13px">'+fin.toLocaleString()+'원</strong> <span style="background:#dc2626;color:#fff;padding:1px 5px;border-radius:3px;font-size:10px">'+pct+'% 할인</span>';
}

function buildColRows(colList) {

    const parts=(c.name||'').split('|');
    const hexVal = parts[0]||'#ffffff';
    const nameVal = parts[1]||'';
    return `<div class="col-block" draggable="true" style="background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px;margin-bottom:8px;cursor:default">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div class="drag-handle" title="드래그로 순서 변경" style="cursor:grab;color:#9ca3af;font-size:18px;flex-shrink:0;padding:0 2px;user-select:none">⠿</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
          <input type="color" value="${hexVal}" style="width:44px;height:44px;padding:2px;border:1.5px solid #e5e7eb;border-radius:8px;cursor:pointer;display:block" class="aio-col-picker" oninput="this.closest('.col-block').querySelector('.aio-col-hex').value=this.value;this.closest('.col-block').querySelector('.col-preview').style.background=this.value">
          <input type="text" value="${hexVal}" maxlength="7" placeholder="#ffffff" style="width:70px;padding:4px 6px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:11px;text-align:center;font-family:monospace" class="aio-col-hex" oninput="if(this.value.match(/^#[0-9a-fA-F]{6}$/)){this.closest('.col-block').querySelector('.aio-col-picker').value=this.value;this.closest('.col-block').querySelector('.col-preview').style.background=this.value}">
        </div>
        <div style="width:44px;height:44px;border-radius:8px;border:1.5px solid #e5e7eb;flex-shrink:0;background:${hexVal}" class="col-preview"></div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px">고객에게 보일 색상명 *</div>
          <input placeholder="예: 코발트 바이올렛" value="${nameVal}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:13px;box-sizing:border-box" class="aio-col-name">
        </div>
        <button onclick="this.closest('.stor-row').remove()" style="padding:6px 10px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;cursor:pointer;font-size:12px;flex-shrink:0;align-self:flex-start">✕</button>
      </div>

        <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px">색상별 이미지 URL (선택)</div>
        <input placeholder="https://... (색상 선택 시 이미지 변경)" value="${c.img||''}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;box-sizing:border-box" class="aio-col-img">

function showAioDevModal(d) {

      <div style="font-size:18px;font-weight:800;margin-bottom:20px;color:#1a237e">${d?'기기 수정':'기기 추가'}</div>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:6px">기기명 *</label>
        <input id="aioDN" value="${d?d.name:''}" placeholder="갤럭시 S26" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box">
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:6px">대표 이미지 URL</label>
        <input id="aioDI" value="${d?d.img||'':''}" placeholder="https://..." style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;box-sizing:border-box">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:700;color:#374151;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          용량 / 가격
          <button id="addStorBtn" style="padding:4px 10px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">+ 용량 추가</button>
        </label>
        <div id="storRows">${buildStorRows(d?d.storageList:[])}</div>
        <small style="color:#9ca3af">용량명과 가격을 입력하세요</small>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:700;color:#374151;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          색상 (색상코드 + 한글명 + 이미지)
          <button id="addColBtn" style="padding:4px 10px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">+ 색상 추가</button>
        </label>
        <div id="colRows">${buildColRows(d?d.colorList:[])}</div>
        <small style="color:#9ca3af">색상코드 + 한글명 필수 · 색상별 이미지 있으면 선택 시 이미지 변경</small>
      </div>
      <div style="margin-bottom:20px;display:flex;align-items:center;gap:10px">
        <label style="font-size:12px;font-weight:700;color:#374151">노출 여부</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="aioDVis" ${visible?'checked':''} style="width:16px;height:16px">
          <span style="font-size:13px;color:#374151">랜딩페이지에 표시</span>
        </label>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="closeAioDevModal()" style="flex:1;padding:12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#fff">취소</button>
        <button onclick="saveAioDev()" style="flex:1;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">저장</button>
      </div>
    </div>`;
  el.onclick = function(e){ if(e.target===el) closeAioDevModal(); };
  document.body.appendChild(el);
  // 드래그 앤 드롭 순서 변경
  (function(){
    const colRows = document.getElementById('colRows');
    let dragEl = null;
    colRows.addEventListener('dragstart', function(e){
      dragEl = e.target.closest('.col-block');
      if(dragEl) { setTimeout(function(){ dragEl.style.opacity='0.4'; }, 0); }
    });
    colRows.addEventListener('dragend', function(e){
      if(dragEl) dragEl.style.opacity='';
      dragEl = null;
      document.querySelectorAll('.col-block').forEach(function(b){ b.style.borderColor='#e5e7eb'; });
    });
    colRows.addEventListener('dragover', function(e){
      e.preventDefault();
      const target = e.target.closest('.col-block');
      if(target && target !== dragEl) {
        document.querySelectorAll('.col-block').forEach(function(b){ b.style.borderColor='#e5e7eb'; });
        target.style.borderColor='#1a237e';
        const rect = target.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        if(e.clientY < mid) colRows.insertBefore(dragEl, target);
        else colRows.insertBefore(dragEl, target.nextSibling);
      }
    });
  })();
  // 버튼 이벤트
  document.getElementById('addStorBtn').onclick = function(){
    document.getElementById('storRows').insertAdjacentHTML('beforeend', buildStorRows([{}]));
  };
  document.getElementById('addColBtn').onclick = function(){
    document.getElementById('colRows').insertAdjacentHTML('beforeend', buildColRows([{}]));
  };
}
window.closeAioDevModal = function(){ const el=document.getElementById('aioDevModal');if(el)el.remove(); };
function calcBoxHtmlJs(msrp, sub, udak, label) {
  if (!msrp || !sub) return label + ' 공시지원금 입력 시 자동계산';
  const fin = msrp - sub - udak;
  const pct = Math.round((1 - fin/msrp)*100);
  return '<span style="color:#6b7280;font-size:11px">'+label+'</span> <del style="color:#9ca3af">'+msrp.toLocaleString()+'원</del> - <span style="color:#dc2626">공시 '+sub.toLocaleString()+'원</span>'+(udak?' - <span style="color:#1a237e">유닥 '+udak.toLocaleString()+'원</span>':'')+' = <strong style="color:#1a237e;font-size:13px">'+fin.toLocaleString()+'원</strong> <span style="background:#dc2626;color:#fff;padding:1px 5px;border-radius:3px;font-size:10px">'+pct+'% 할인</span>';
}

function calcStorPrice(el) {
  const row = el.closest('.stor-row') || el.closest('div');
  // 타사 계산
  const tasaBox = row.querySelector('.stor-calc-tasa');
  if (tasaBox) {
    const msrp = parseInt(row.querySelector('.aio-stor-msrp')?.value) || 0;
    const sub  = parseInt(row.querySelector('.aio-stor-subsidy')?.value) || 0;
    const udak = parseInt(row.querySelector('.aio-stor-udak')?.value) || 0;
    tasaBox.innerHTML = calcBoxHtmlJs(msrp, sub, udak, '타사');
  }
  // 자사 계산
  const lguBox = row.querySelector('.stor-calc-lgu');
  if (lguBox) {
    const msrpL = parseInt(row.querySelector('.aio-stor-msrp-lgu')?.value) || 0;
    const subL  = parseInt(row.querySelector('.aio-stor-subsidy-lgu')?.value) || 0;
    const udakL = parseInt(row.querySelector('.aio-stor-udak-lgu')?.value) || 0;
    lguBox.innerHTML = calcBoxHtmlJs(msrpL, subL, udakL, '자사');
  }
}

window.saveAioDev = async function(){
  const name = document.getElementById('aioDN').value.trim();
  const img = document.getElementById('aioDI').value.trim();
  const visible = document.getElementById('aioDVis').checked;
  if(!name){alert('기기명은 필수입니다.');return;}
  const storageList = [];
  document.querySelectorAll('#storRows .aio-stor-name').forEach(function(el){
    const n = el.value.trim();
    const container = el.closest('.stor-row') || el.parentElement;
    const ms  = parseInt(container.querySelector('.aio-stor-msrp')?.value)||0;
    const sb  = parseInt(container.querySelector('.aio-stor-subsidy')?.value)||0;
    const ud  = parseInt(container.querySelector('.aio-stor-udak')?.value)||0;
    const msL = parseInt(container.querySelector('.aio-stor-msrp-lgu')?.value)||ms;
    const sbL = parseInt(container.querySelector('.aio-stor-subsidy-lgu')?.value)||0;
    const udL = parseInt(container.querySelector('.aio-stor-udak-lgu')?.value)||0;
    const finTasa = ms ? ms-sb-ud : 0;
    const finLgu  = msL ? msL-sbL-udL : 0;
    if(n) storageList.push({
      name:n, price:finTasa,
      msrp:ms, subsidy:sb, udak:ud,
      msrp_lgu:msL, subsidy_lgu:sbL, udak_lgu:udL,
      price_lgu:finLgu
    });
  });
  const colorList = [];
  document.querySelectorAll('#colRows .aio-col-hex').forEach(function(el){
    const hex = el.value;
    const container = el.closest('.col-block') || el.parentElement;
    const label = container.querySelector('.aio-col-name').value.trim();
    const cImg = container.querySelector('.aio-col-img').value.trim();
    if(label) colorList.push({name: hex+'|'+label, img: cImg});
  });
  const data = {name, img, storageList, colorList, visible};
  if(_aioDevKey) await db.ref(`devices/${_aioDevKey}`).update(data);
  else await db.ref('devices').push(data);
  closeAioDevModal(); toast('저장되었습니다.'); renderAioDevices();
};

window.saveAioBenefits = async function(){
  const data = {
    watch_name: document.getElementById('bf_wn').value.trim(),
    watch_device: parseInt(document.getElementById('bf_wd').value)||0,
    watch_monthly: parseInt(document.getElementById('bf_wm').value)||0,
    tab_name: document.getElementById('bf_tn').value.trim(),
    tab_device: parseInt(document.getElementById('bf_td').value)||0,
    tab_monthly: parseInt(document.getElementById('bf_tm').value)||0,
    internet_monthly: parseInt(document.getElementById('bf_im').value)||0,
    child_discount: parseInt(document.getElementById('bf_cd').value)||0,
    show_phone: document.getElementById('bf_showPhone').checked,
    show_public: document.getElementById('bf_showPublic').checked,
    jt_usim_title: document.getElementById('bf_jt_usim_title').value.trim() || '유심만 변경',
    jt_usim_desc: document.getElementById('bf_jt_usim_desc').value.trim() || '번호이동 · 기기 유지',
    jt_phone_title: document.getElementById('bf_jt_phone_title').value.trim() || '핸드폰도 변경',
    jt_phone_desc: document.getElementById('bf_jt_phone_desc').value.trim() || '기기 교체 포함',
    succ_title: document.getElementById('bf_succ_title').value.trim() || '상담 신청 완료!',
    succ_desc: document.getElementById('bf_succ_desc').value.trim() || '빠르게 연락드리겠습니다!\\n정확한 혜택은 상담을 통해 안내드립니다.'
  };
  try {
    const result = await db.ref('planFeats').set(data);
    console.log('[AIO Admin] planFeats 저장 결과:', JSON.stringify(result));
    console.log('[AIO Admin] 저장 데이터 show_phone:', data.show_phone, 'show_public:', data.show_public);
    toast('✅ 저장 완료! (랜딩 새로고침 시 반영)');
  } catch(e) {
    console.error('[AIO Admin] 저장 실패:', e);
    alert('저장 실패: ' + e.message);
  }
};
